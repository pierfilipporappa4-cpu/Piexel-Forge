<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="description" content="Advanced bitmap dithering tool with 13 algorithms and pattern support">
    <title>Pie.xel Forge</title>
    
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #ffffff;
            color: #000000;
            overflow: hidden;
            touch-action: none;
        }
        
        .container {
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            border: 6px solid #000000;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: #000000;
            color: #ffffff;
            padding: 12px 20px;
            border-bottom: 6px solid #000000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            position: relative;
            z-index: 200;
        }
        
        .header h1 {
            font-size: clamp(0.9rem, 4vw, 1.3rem);
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .header-info {
            display: flex;
            gap: 10px;
            font-size: clamp(0.6rem, 2vw, 0.8rem);
            letter-spacing: 1px;
            align-items: center;
        }

        .preview-notice {
            background: rgba(255, 102, 0, 0.15);
            padding: 4px 10px;
            font-size: clamp(0.55rem, 1.5vw, 0.65rem);
            border: 1px solid #ff6600;
            border-radius: 3px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .preview-notice-icon {
            color: #ff6600;
            font-weight: bold;
        }

        .menu-toggle {
            display: none;
            background: #ff6600;
            border: none;
            color: #ffffff;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px 12px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 320px 1fr;
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        
        .controls {
            background: #f5f5f5;
            border-right: 6px solid #000000;
            overflow-y: auto;
            overflow-x: hidden;
            transition: transform 0.3s ease, opacity 0.2s ease;
            position: relative;
        }

        .controls.reducing-opacity {
            opacity: 0.4;
            pointer-events: none;
        }
        
        .controls::-webkit-scrollbar {
            width: 8px;
        }
        
        .controls::-webkit-scrollbar-track {
            background: #000000;
        }
        
        .controls::-webkit-scrollbar-thumb {
            background: #ff6600;
        }
        
        .control-section {
            border-bottom: 2px solid #000000;
            padding: 15px;
        }
        
        .control-section:last-child {
            border-bottom: none;
        }
        
        .control-group {
            margin-bottom: 12px;
        }
        
        .control-group:last-child {
            margin-bottom: 0;
        }
        
        .control-group label {
            font-weight: bold;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 6px;
        }
        
        .label-with-value {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .range-value {
            font-weight: bold;
            color: #ff6600;
            font-size: 0.9rem;
        }
        
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            border: 2px solid #000000;
        }
        
        .btn {
            padding: clamp(8px, 2vh, 12px);
            border: none;
            border-right: 2px solid #000000;
            background: #ffffff;
            cursor: pointer;
            font-weight: bold;
            font-size: clamp(0.65rem, 1.5vw, 0.75rem);
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.1s;
            min-height: 44px;
        }
        
        .btn:last-child {
            border-right: none;
        }
        
        .btn:hover, .btn:active {
            background: #000000;
            color: #ffffff;
        }
        
        .btn.active {
            background: #ff6600;
            color: #ffffff;
        }
        
        .upload-area {
            border: 2px dashed #000000;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: #ffffff;
            transition: all 0.1s;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .upload-area:hover, .upload-area:active {
            background: #000000;
            color: #ffffff;
        }
        
        .upload-area:hover .upload-btn,
        .upload-area:active .upload-btn {
            background: #ff6600;
            border-color: #ff6600;
        }
        
        .upload-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            cursor: pointer;
            font-weight: bold;
            font-size: clamp(0.65rem, 1.5vw, 0.75rem);
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.1s;
            min-height: 44px;
        }
        
        .upload-btn:hover, .upload-btn:active {
            background: #ff6600;
            border-color: #ff6600;
        }
        
        .upload-text {
            margin-top: 8px;
            font-size: clamp(0.55rem, 1.2vw, 0.65rem);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .slider-container {
            position: relative;
            padding: 12px 0;
        }
        
        input[type="range"] {
            width: 100%;
            height: 8px;
            background: #000000;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: #ff6600;
            cursor: pointer;
            border: 2px solid #000000;
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            background: #ff6600;
            cursor: pointer;
            border: 2px solid #000000;
        }
        
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #000000;
            background: #ffffff;
            font-size: clamp(0.65rem, 1.5vw, 0.75rem);
            font-weight: bold;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            min-height: 44px;
        }
        
        select:hover, select:active {
            background: #000000;
            color: #ffffff;
        }
        
        select:focus {
            outline: none;
            background: #ff6600;
            color: #ffffff;
        }
        
        .canvas-container {
            position: relative;
            background: #e0e0e0;
            overflow: hidden;
            cursor: grab;
            touch-action: none;
        }
        
        .canvas-container.grabbing {
            cursor: grabbing;
        }

        .canvas-container.crop-mode {
            cursor: crosshair;
        }
        
        .canvas-container.processing {
            pointer-events: none;
            opacity: 0.7;
        }
        
        .canvas-viewport {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
            will-change: transform;
            backface-visibility: hidden;
            perspective: 1000px;
            min-width: 100px;
            min-height: 100px;
        }
        
        canvas {
            display: block;
            image-rendering: pixelated;
            backface-visibility: hidden;
            max-width: 100%;
            max-height: 100%;
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            display: none;
        }

        .grid-overlay.visible {
            display: block;
        }
        
        .placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            padding: 60px 40px;
            border: 3px dashed #000000;
            background: #ffffff;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 240px;
            user-select: none;
        }

        .placeholder:hover {
            background: #000000;
            color: #ffffff;
            border-color: #ff6600;
            transform: translate(-50%, -50%) scale(1.02);
        }

        .placeholder:active {
            transform: translate(-50%, -50%) scale(0.98);
        }
        
        .placeholder-icon {
            font-size: clamp(3rem, 10vw, 4rem);
            margin-bottom: 20px;
            line-height: 1;
        }
        
        .placeholder p {
            font-size: clamp(0.75rem, 2vw, 0.9rem);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            line-height: 1.4;
        }

        .crop-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
            z-index: 50;
        }

        .crop-overlay.active {
            display: block;
            pointer-events: all;
        }

        .crop-selection {
            position: absolute;
            border: 2px solid #ff6600;
            background: rgba(255, 102, 0, 0.1);
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
        }

        .crop-handle {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #ff6600;
            border: 2px solid #000000;
        }

        .crop-handle.nw { top: -8px; left: -8px; cursor: nw-resize; }
        .crop-handle.ne { top: -8px; right: -8px; cursor: ne-resize; }
        .crop-handle.sw { bottom: -8px; left: -8px; cursor: sw-resize; }
        .crop-handle.se { bottom: -8px; right: -8px; cursor: se-resize; }

        .toolbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000;
            border: 2px solid #000000;
            padding: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            z-index: 100;
            max-width: 90%;
            justify-content: center;
        }

        .tool-btn {
            padding: clamp(6px, 1.5vh, 10px) clamp(8px, 2vw, 12px);
            background: #ffffff;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: clamp(0.6rem, 1.5vw, 0.75rem);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.1s;
            min-height: 40px;
            white-space: nowrap;
        }
        
        .tool-btn:hover:not(:disabled),
        .tool-btn:active:not(:disabled) {
            background: #ff6600;
            color: #ffffff;
        }

        .tool-btn.active {
            background: #ff6600;
            color: #ffffff;
        }

        .tool-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .tool-btn.mobile-hidden {
            display: inline-block;
        }

        .toolbar-divider {
            width: 2px;
            background: #ffffff;
            margin: 0 4px;
        }

        .zoom-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #000000;
            color: #ffffff;
            padding: 8px 12px;
            font-size: clamp(0.6rem, 1.5vw, 0.75rem);
            font-weight: bold;
            letter-spacing: 1px;
            border: 2px solid #000000;
        }

        .shortcuts-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            color: #ffffff;
            padding: 12px;
            font-size: 0.65rem;
            letter-spacing: 0.5px;
            border: 2px solid #000000;
            max-width: 250px;
            display: none;
        }

        .shortcuts-hint.visible {
            display: block;
        }

        .shortcuts-hint h4 {
            color: #ff6600;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .shortcuts-hint div {
            margin: 4px 0;
        }

        .shortcuts-hint kbd {
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            color: #ff6600;
        }
        
        .export-btn {
            width: 100%;
            padding: 12px;
            border: 2px solid #000000;
            background: #000000;
            color: #ffffff;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: clamp(0.65rem, 1.5vw, 0.75rem);
            transition: all 0.1s;
            min-height: 44px;
        }
        
        .export-btn:hover,
        .export-btn:active {
            background: #ff6600;
        }
        
        .pattern-preview {
            width: 100%;
            height: clamp(80px, 15vh, 120px);
            border: 2px solid #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            overflow: hidden;
            position: relative;
        }
        
        .pattern-preview canvas {
            image-rendering: pixelated;
        }
        
        .pattern-preview-text {
            font-size: clamp(0.55rem, 1.2vw, 0.65rem);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pattern-library {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 10px;
        }

        .pattern-item {
            aspect-ratio: 1;
            border: 2px solid #000000;
            background: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
            position: relative;
            min-height: 50px;
        }

        .pattern-item:hover,
        .pattern-item:active {
            background: #f5f5f5;
            border-color: #ff6600;
        }

        .pattern-item.active {
            background: #ff6600;
            border-color: #ff6600;
        }

        .pattern-item canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
        
        .pattern-name {
            position: absolute;
            bottom: 2px;
            left: 2px;
            right: 2px;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: clamp(0.45rem, 1vw, 0.55rem);
            padding: 2px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pattern-item.active .pattern-name {
            background: rgba(0,0,0,0.9);
        }

        .section-title {
            font-size: clamp(0.7rem, 1.8vw, 0.8rem);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid #000000;
        }

        .dots {
            display: inline-block;
        }

        .dots::before {
            content: '•••';
            color: #ff6600;
            margin: 0 5px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            border: 2px solid #000000;
            background: #ffffff;
            cursor: pointer;
            transition: all 0.1s;
            min-height: 44px;
        }

        .checkbox-container:hover,
        .checkbox-container:active {
            background: #f5f5f5;
        }

        .checkbox-container input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #ff6600;
        }

        .checkbox-container label {
            cursor: pointer;
            margin: 0;
            font-size: clamp(0.6rem, 1.5vw, 0.7rem);
        }

        .rotation-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            border: 2px solid #000000;
        }

        .rotation-btn {
            padding: 10px;
            border: none;
            border-right: 2px solid #000000;
            background: #ffffff;
            cursor: pointer;
            font-weight: bold;
            font-size: clamp(0.6rem, 1.5vw, 0.7rem);
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.1s;
            min-height: 44px;
        }

        .rotation-btn:last-child {
            border-right: none;
        }

        .rotation-btn:hover,
        .rotation-btn:active {
            background: #000000;
            color: #ffffff;
        }

        .rotation-btn.active {
            background: #ff6600;
            color: #ffffff;
        }

        .loading-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #ff6600;
            padding: 20px 40px;
            border: 2px solid #ff6600;
            font-weight: bold;
            font-size: clamp(0.8rem, 2vw, 1rem);
            letter-spacing: 2px;
            z-index: 1000;
            display: none;
        }

        .loading-overlay.visible {
            display: block;
        }

        @media (max-width: 768px) {
            .container {
                border: 2px solid #000000;
            }

            .header {
                padding: 6px 8px;
                padding-top: max(6px, env(safe-area-inset-top));
                padding-left: max(8px, env(safe-area-inset-left));
                padding-right: max(8px, env(safe-area-inset-right));
                border-bottom: 2px solid #000000;
            }

            .header h1 {
                font-size: 0.75rem;
                letter-spacing: 1px;
            }

            .menu-toggle {
                display: block;
                font-size: 1.2rem;
                padding: 6px 8px;
            }

            .header-info {
                display: none;
            }

            .main-content {
                grid-template-columns: 1fr;
            }

            .controls {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                max-width: 300px;
                height: 100%;
                max-height: 100vh;
                z-index: 150;
                border-right: 2px solid #000000;
                transform: translateX(-100%);
                box-shadow: 5px 0 15px rgba(0,0,0,0.3);
                overflow-y: auto;
                overflow-x: hidden;
                padding-top: max(0px, env(safe-area-inset-top));
                padding-left: max(0px, env(safe-area-inset-left));
                padding-bottom: max(80px, env(safe-area-inset-bottom));
            }
            
            .controls.open {
                transform: translateX(0);
            }

            .control-section {
                border-bottom: 1px solid #000000;
                padding: 8px 10px;
            }

            .control-section:last-child {
                border-bottom: none;
                padding-bottom: 20px;
            }

            .section-title {
                font-size: 0.55rem;
                padding-bottom: 6px;
                margin-bottom: 8px;
            }

            .control-group {
                margin-bottom: 8px;
            }

            .control-group label {
                font-size: 0.55rem;
                margin-bottom: 4px;
            }

            .slider-container input[type="range"] {
                height: 3px;
            }

            .range-value {
                font-size: 0.65rem;
            }

            .btn {
                padding: 6px 8px;
                font-size: 0.5rem;
                min-height: 36px;
            }

            .upload-btn {
                font-size: 0.5rem;
                padding: 6px 8px;
                min-height: 36px;
            }

            .upload-area {
                min-height: 60px;
                padding: 10px;
            }

            .upload-text {
                margin-top: 4px;
                font-size: 0.45rem;
            }

            .pattern-library {
                grid-template-columns: repeat(3, 1fr);
                gap: 4px;
            }

            .pattern-item {
                min-height: 40px;
            }

            .pattern-item canvas {
                width: 100%;
                height: 100%;
            }

            .rotation-group {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 4px;
            }

            .rotation-btn {
                font-size: 0.5rem;
                padding: 4px;
                min-height: 28px;
            }

            select {
                font-size: 0.55rem;
                padding: 4px 6px;
            }

            .toolbar {
                position: fixed;
                bottom: max(8px, env(safe-area-inset-bottom));
                left: 8px;
                right: 8px;
                transform: none;
                padding: 4px;
                gap: 3px;
                justify-content: flex-start;
                flex-wrap: nowrap;
                overflow-x: auto;
                max-width: none;
            }

            .tool-btn {
                font-size: 0.45rem;
                padding: 4px 6px;
                min-height: 28px;
                border: 1px solid #000000;
                flex-shrink: 0;
            }

            .tool-btn.mobile-hidden {
                display: none;
            }

            .toolbar-divider {
                display: none;
            }

            .zoom-info {
                top: 8px;
                right: 8px;
                padding: 4px 8px;
                font-size: 0.55rem;
                border: 1px solid #000000;
            }

            .shortcuts-hint {
                display: none !important;
            }

            .crop-handle {
                width: 16px;
                height: 16px;
            }

            .placeholder {
                padding: 20px 15px;
                min-width: 180px;
                max-width: 85%;
            }

            .placeholder-icon {
                font-size: 1.8rem;
                margin-bottom: 10px;
            }

            .placeholder-text {
                font-size: 0.55rem;
            }

            .preview-notice {
                font-size: 0.45rem;
                padding: 2px 4px;
            }

            .loading-overlay {
                font-size: 0.7rem;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .main-content {
                grid-template-columns: 260px 1fr;
            }

            .control-section {
                padding: 10px;
            }

            .control-group label {
                font-size: 0.6rem;
            }
            
            .pattern-library {
                grid-template-columns: repeat(3, 1fr);
                gap: 4px;
            }

            .toolbar {
                gap: 4px;
                padding: 5px;
            }

            .tool-btn {
                font-size: 0.55rem;
                padding: 7px 9px;
                min-height: 34px;
            }
        }

        @media (min-width: 1400px) {
            .main-content {
                grid-template-columns: 360px 1fr;
            }

            .control-section {
                padding: 18px;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .header {
                padding: 4px 8px;
            }

            .header h1 {
                font-size: 0.7rem;
                letter-spacing: 0.5px;
            }

            .menu-toggle {
                font-size: 1rem;

        ];

        // ============================================

        };

        const gridCtx = elements.gridCanvas.getContext('2d');

        // ============================================
        // IMAGE LOADING
        // ============================================

        function loadImage(file) {
            const img = new Image();
            img.onload = function() {
                canvas = null;
                ctx = null;
                history = [];
                historyIndex = -1;
                cropState.active = false;
                
                originalImage = null;
                previewImage = null;
                
                while (elements.canvasWrapper.lastChild) {
                    const child = elements.canvasWrapper.lastChild;
                    if (child.id === 'placeholder') break;
                    elements.canvasWrapper.removeChild(child);
                }
                
                if (elements.gridCanvas) {
                    elements.gridCanvas.width = 0;
                    elements.gridCanvas.height = 0;
                }
                
                originalImage = img;
                
                const MAX_PREVIEW = isMobile() ? 1200 : 2000;
                let previewWidth = img.width;
                let previewHeight = img.height;
                
                if (img.width > MAX_PREVIEW || img.height > MAX_PREVIEW) {
                    const scale = Math.min(MAX_PREVIEW / img.width, MAX_PREVIEW / img.height);
                    previewWidth = Math.floor(img.width * scale);
                    previewHeight = Math.floor(img.height * scale);
                    previewScale = 1 / scale;
                } else {
                    previewScale = 1;
                }
                
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = previewWidth;
                tempCanvas.height = previewHeight;
                const tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
                tempCtx.imageSmoothingEnabled = true;
                tempCtx.imageSmoothingQuality = 'high';
                tempCtx.drawImage(img, 0, 0, previewWidth, previewHeight);
                
                previewImage = tempCanvas;
                
                updateDimensionsDisplay();
                resetViewport();
                
                setTimeout(() => processImage(), 50);
                URL.revokeObjectURL(img.src);
            };
            
            img.onerror = function() {
                alert("Errore nel caricamento dell'immagine");
                URL.revokeObjectURL(img.src);
            };
            
            img.src = URL.createObjectURL(file);
        }

        function updateDimensionsDisplay() {
            if (!originalImage) return;
            
            const origW = originalImage.width;
            const origH = originalImage.height;
            const prevW = previewImage.width;
            const prevH = previewImage.height;
            
            if (previewScale > 1.01) {
                elements.imageDimensions.innerHTML = `${origW}×${origH}`;
                elements.previewNoticeHeader.innerHTML = `<div class="preview-notice"><span class="preview-notice-icon">⚠</span> <span>Preview ${prevW}×${prevH} · Export full-res</span></div>`;

        // ============================================
        // SETTINGS GETTER
        // ============================================

        function getCurrentSettings() {
            return {
                cellSize: parseInt(elements.sizeSlider.value),
                cellGap: parseInt(elements.cellGapSlider.value),
                threshold: parseInt(elements.thresholdSlider.value),

                isColorMode: isColorMode,
                pattern: selectedPattern,
                patternRotation: patternRotation,
                patternScale: patternScale,
                transparent: elements.transparentBg.checked
            };
        }

        // ============================================
        // PROCESSING
        // ============================================

        function processImage() {
            if (!previewImage || isProcessing) return;
            
            isProcessing = true;
            const method = elements.ditheringMethod.value;
            const settings = getCurrentSettings();
            
            setTimeout(() => {
                try {
                    const resultCanvas = applyDitheringToImage(previewImage, method, settings);
                    
                    while (elements.canvasWrapper.lastChild) {
                        const child = elements.canvasWrapper.lastChild;
                        if (child.id === 'placeholder') break;
                        elements.canvasWrapper.removeChild(child);
                    }
                    
                    canvas = resultCanvas;
                    ctx = canvas.getContext('2d');
                    elements.canvasWrapper.appendChild(canvas);
                    
                    if (elements.placeholder) {
                        elements.placeholder.style.display = 'none';
                    }
                    
                    updateCanvasTransform();
                    if (gridVisible) drawGrid();
                    addToHistory();
                    
                } catch (error) {
                    console.error('Processing error:', error);
                    alert('Errore durante il processing');
                } finally {
                    isProcessing = false;
                }
            }, 10);
        }

        // ============================================
        // DITHERING - FUNZIONE UNIFICATA
        // ============================================

        function applyDitheringToImage(sourceImage, method, settings) {
            const resultCanvas = document.createElement('canvas');
            resultCanvas.width = sourceImage.width;
            resultCanvas.height = sourceImage.height;
            const resultCtx = resultCanvas.getContext('2d', { willReadFrequently: true });
            
            resultCtx.drawImage(sourceImage, 0, 0);
            
            if (settings.transparent && !settings.isColorMode) {
                const tempImageData = resultCtx.getImageData(0, 0, resultCanvas.width, resultCanvas.height);
                applyAlgorithm(tempImageData, method, settings);
                resultCtx.putImageData(tempImageData, 0, 0);
                
                const finalImageData = resultCtx.getImageData(0, 0, resultCanvas.width, resultCanvas.height);
                const data = finalImageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    if (data[i] === 255 && data[i+1] === 255 && data[i+2] === 255) {
                        data[i+3] = 0;
                    }
                }
                resultCtx.putImageData(finalImageData, 0, 0);
                return resultCanvas;
            }
            
            const imageData = resultCtx.getImageData(0, 0, resultCanvas.width, resultCanvas.height);
            applyAlgorithm(imageData, method, settings);
            resultCtx.putImageData(imageData, 0, 0);
            
            return resultCanvas;
        }

        function applyAlgorithm(imageData, method, settings) {
            switch(method) {
                case 'bitmap':
                    applyBitmap(imageData, settings.cellSize, settings.cellGap, settings.threshold, settings.isColorMode);
                    break;
                case 'stretch':
                    applyStretch(imageData, settings.cellSize, settings.cellGap, settings.thickness, settings.isColorMode);
                    break;
                case 'floyd-steinberg':
                    applyFloydSteinberg(imageData, settings.isColorMode);
                    break;
                case 'atkinson':
                    applyAtkinson(imageData, settings.isColorMode);
                    break;
                case 'jarvis':
                    applyJarvis(imageData, settings.isColorMode);
                    break;
                case 'stucki':
                    applyStucki(imageData, settings.isColorMode);
                    break;
                case 'bayer2x2':
                    applyBayerDithering(imageData, bayer2x2, settings.isColorMode);
                    break;
                case 'bayer4x4':
                    applyBayerDithering(imageData, bayer4x4, settings.isColorMode);
                    break;
                case 'bayer8x8':
                    applyBayerDithering(imageData, bayer8x8, settings.isColorMode);
                    break;
                case 'clustered':
                    applyBayerDithering(imageData, clustered4x4, settings.isColorMode);
                    break;
                case 'random':
                    applyRandomDithering(imageData, settings.threshold, settings.isColorMode);
                    break;
                case 'crossstitch':
                    applyCrossStitch(imageData, settings.cellSize, settings.cellGap, settings.isColorMode, settings.threshold, settings.thickness);
                    break;
                case 'pattern':
                    if (settings.pattern) {
                        applyPatternDithering(imageData, settings.pattern, settings.patternRotation, settings.patternScale, settings.isColorMode, settings.cellSize, settings.cellGap, settings.threshold);
                    }
                    break;
            }
        }

        // ============================================
        // DITHERING ALGORITHMS - CON BUG CELLGAP RISOLTO
        // ============================================

        function applyBitmap(imageData, cellSize, cellGap, threshold, isColor) {
            const { width, height, data } = imageData;
            const tempData = new Uint8ClampedArray(data);
            const step = cellSize + cellGap;
            
            // Prima fase: riempimento celle
            for (let y = 0; y < height; y += step) {
                for (let x = 0; x < width; x += step) {
                    let sumR = 0, sumG = 0, sumB = 0, count = 0;
                    
                    for (let cy = 0; cy < cellSize && y + cy < height; cy++) {
                        for (let cx = 0; cx < cellSize && x + cx < width; cx++) {
                            const i = ((y + cy) * width + (x + cx)) * 4;
                            sumR += tempData[i];
                            sumG += tempData[i + 1];
                            sumB += tempData[i + 2];
                            count++;
                        }
                    }
                    
                    const avgR = sumR / count;
                    const avgG = sumG / count;
                    const avgB = sumB / count;
                    const gray = 0.299 * avgR + 0.587 * avgG + 0.114 * avgB;
                    
                    let fillR, fillG, fillB;
                    if (isColor) {
                        fillR = avgR > threshold ? 255 : 0;
                        fillG = avgG > threshold ? 255 : 0;
                        fillB = avgB > threshold ? 255 : 0;
                    } else {
                        fillR = fillG = fillB = gray > threshold ? 255 : 0;
                    }
                    
                    for (let cy = 0; cy < cellSize && y + cy < height; cy++) {
                        for (let cx = 0; cx < cellSize && x + cx < width; cx++) {
                            const i = ((y + cy) * width + (x + cx)) * 4;
                            data[i] = fillR;
                            data[i + 1] = fillG;
                            data[i + 2] = fillB;
                        }
                    }
                }
            }
            
            // Seconda fase: riempimento gap con bianco (CORRETTO)
            if (cellGap > 0) {
                for (let y = 0; y < height; y += step) {
                    for (let x = 0; x < width; x += step) {
                        // Gap orizzontale (sotto la cella)
                        for (let gy = 0; gy < cellGap && y + cellSize + gy < height; gy++) {
                            for (let gx = 0; gx < cellSize && x + gx < width; gx++) {
                                const i = ((y + cellSize + gy) * width + (x + gx)) * 4;
                                data[i] = data[i + 1] = data[i + 2] = 255;
                            }
                        }
                        
                        // Gap verticale (a destra della cella)
                        for (let gx = 0; gx < cellGap && x + cellSize + gx < width; gx++) {
                            for (let cy = 0; cy < cellSize && y + cy < height; cy++) {
                                const i = ((y + cy) * width + (x + cellSize + gx)) * 4;
                                data[i] = data[i + 1] = data[i + 2] = 255;
                            }
                        }
                        
                        // Gap angolare (angolo in basso a destra)
                        for (let gy = 0; gy < cellGap && y + cellSize + gy < height; gy++) {
                            for (let gx = 0; gx < cellGap && x + cellSize + gx < width; gx++) {
                                const i = ((y + cellSize + gy) * width + (x + cellSize + gx)) * 4;
                                data[i] = data[i + 1] = data[i + 2] = 255;
                            }
                        }
                    }
                }
            }
        }

        function applyStretch(imageData, cellSize, cellGap, thickness, isColor) {
            const { width, height, data } = imageData;
            const tempData = new Uint8ClampedArray(data);
            const step = cellSize + cellGap;
            
            data.fill(255);
            
            for (let y = 0; y < height; y += step) {
                for (let x = 0; x < width; x += step) {
                    let sumR = 0, sumG = 0, sumB = 0, count = 0;
                    
                    for (let cy = 0; cy < cellSize && y + cy < height; cy++) {
                        for (let cx = 0; cx < cellSize && x + cx < width; cx++) {
                            const i = ((y + cy) * width + (x + cx)) * 4;
                            sumR += tempData[i];
                            sumG += tempData[i + 1];
                            sumB += tempData[i + 2];
                            count++;
                        }
                    }
                    
                    const avgR = sumR / count;
                    const avgG = sumG / count;
                    const avgB = sumB / count;
                    const intensity = 0.299 * avgR + 0.587 * avgG + 0.114 * avgB;
                    
                    const lineLength = Math.floor((intensity / 255) * (cellSize - 1));
                    
                    for (let i = 0; i < lineLength; i += thickness) {
                        for (let t = 0; t < thickness && i + t < cellSize; t++) {
                            for (let cx = 0; cx < cellSize && x + cx < width; cx++) {
                                const posY = y + cellSize - 1 - (i + t);
                                if (posY >= 0 && posY < height) {
                                    const idx = (posY * width + (x + cx)) * 4;
                                    if (isColor) {
                                        data[idx] = avgR > 128 ? 0 : 255;
                                        data[idx + 1] = avgG > 128 ? 0 : 255;
                                        data[idx + 2] = avgB > 128 ? 0 : 255;
                                    } else {
                                        data[idx] = data[idx + 1] = data[idx + 2] = 0;
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }

        function applyFloydSteinberg(imageData, isColor) {
            const { width, height, data } = imageData;
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = (y * width + x) * 4;
                    const oldR = data[i];
                    const oldG = data[i + 1];
                    const oldB = data[i + 2];
                    
                    let newR, newG, newB;
                    if (isColor) {
                        newR = oldR > 128 ? 255 : 0;
                        newG = oldG > 128 ? 255 : 0;
                        newB = oldB > 128 ? 255 : 0;
                    } else {
                        const gray = 0.299 * oldR + 0.587 * oldG + 0.114 * oldB;
                        newR = newG = newB = gray > 128 ? 255 : 0;
                    }
                    
                    data[i] = newR;
                    data[i + 1] = newG;
                    data[i + 2] = newB;
                    
                    const errR = oldR - newR;
                    const errG = oldG - newG;
                    const errB = oldB - newB;
                    
                    distributeError(data, width, height, x, y, errR, errG, errB, [
                        { dx: 1, dy: 0, factor: 7/16 },
                        { dx: -1, dy: 1, factor: 3/16 },
                        { dx: 0, dy: 1, factor: 5/16 },
                        { dx: 1, dy: 1, factor: 1/16 }
                    ]);
                }
            }
        }

        function applyAtkinson(imageData, isColor) {
            const { width, height, data } = imageData;
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = (y * width + x) * 4;
                    const oldR = data[i];
                    const oldG = data[i + 1];
                    const oldB = data[i + 2];
                    
                    let newR, newG, newB;
                    if (isColor) {
                        newR = oldR > 128 ? 255 : 0;
                        newG = oldG > 128 ? 255 : 0;
                        newB = oldB > 128 ? 255 : 0;
                    } else {
