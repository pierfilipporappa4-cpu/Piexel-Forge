                        newR = newG = newB = gray > 128 ? 255 : 0;
                    }
                    
                    data[i] = newR;
                    data[i + 1] = newG;
                    data[i + 2] = newB;
                    
                    const errR = oldR - newR;
                    const errG = oldG - newG;
                    const errB = oldB - newB;
                    
                    distributeError(data, width, height, x, y, errR, errG, errB, [
                        { dx: 1, dy: 0, factor: 1/8 },
                        { dx: 2, dy: 0, factor: 1/8 },
                        { dx: -1, dy: 1, factor: 1/8 },
                        { dx: 0, dy: 1, factor: 1/8 },
                        { dx: 1, dy: 1, factor: 1/8 },
                        { dx: 0, dy: 2, factor: 1/8 }
                    ]);
                }
            }
        }

        function applyJarvis(imageData, isColor) {
            const { width, height, data } = imageData;
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = (y * width + x) * 4;
                    const oldR = data[i];
                    const oldG = data[i + 1];
                    const oldB = data[i + 2];
                    
                    let newR, newG, newB;
                    if (isColor) {
                        newR = oldR > 128 ? 255 : 0;
                        newG = oldG > 128 ? 255 : 0;
                        newB = oldB > 128 ? 255 : 0;
                    } else {
                        const gray = 0.299 * oldR + 0.587 * oldG + 0.114 * oldB;
                        newR = newG = newB = gray > 128 ? 255 : 0;
                    }
                    
                    data[i] = newR;
                    data[i + 1] = newG;
                    data[i + 2] = newB;
                    
                    const errR = oldR - newR;
                    const errG = oldG - newG;
                    const errB = oldB - newB;
                    
                    distributeError(data, width, height, x, y, errR, errG, errB, [
                        { dx: 1, dy: 0, factor: 7/48 },
                        { dx: 2, dy: 0, factor: 5/48 },
                        { dx: -2, dy: 1, factor: 3/48 },
                        { dx: -1, dy: 1, factor: 5/48 },
                        { dx: 0, dy: 1, factor: 7/48 },
                        { dx: 1, dy: 1, factor: 5/48 },
                        { dx: 2, dy: 1, factor: 3/48 },
                        { dx: -2, dy: 2, factor: 1/48 },
                        { dx: -1, dy: 2, factor: 3/48 },
                        { dx: 0, dy: 2, factor: 5/48 },
                        { dx: 1, dy: 2, factor: 3/48 },
                        { dx: 2, dy: 2, factor: 1/48 }
                    ]);
                }
            }
        }

        function applyStucki(imageData, isColor) {
            const { width, height, data } = imageData;
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = (y * width + x) * 4;
                    const oldR = data[i];
                    const oldG = data[i + 1];
                    const oldB = data[i + 2];
                    
                    let newR, newG, newB;
                    if (isColor) {
                        newR = oldR > 128 ? 255 : 0;
                        newG = oldG > 128 ? 255 : 0;
                        newB = oldB > 128 ? 255 : 0;
                    } else {
                        const gray = 0.299 * oldR + 0.587 * oldG + 0.114 * oldB;
                        newR = newG = newB = gray > 128 ? 255 : 0;
                    }
                    
                    data[i] = newR;
                    data[i + 1] = newG;
                    data[i + 2] = newB;
                    
                    const errR = oldR - newR;
                    const errG = oldG - newG;
                    const errB = oldB - newB;
                    
                    distributeError(data, width, height, x, y, errR, errG, errB, [
                        { dx: 1, dy: 0, factor: 8/42 },
                        { dx: 2, dy: 0, factor: 4/42 },
                        { dx: -2, dy: 1, factor: 2/42 },
                        { dx: -1, dy: 1, factor: 4/42 },
                        { dx: 0, dy: 1, factor: 8/42 },
                        { dx: 1, dy: 1, factor: 4/42 },
                        { dx: 2, dy: 1, factor: 2/42 },
                        { dx: -2, dy: 2, factor: 1/42 },
                        { dx: -1, dy: 2, factor: 2/42 },
                        { dx: 0, dy: 2, factor: 4/42 },
                        { dx: 1, dy: 2, factor: 2/42 },
                        { dx: 2, dy: 2, factor: 1/42 }
                    ]);
                }
            }
        }

        function distributeError(data, width, height, x, y, errR, errG, errB, distribution) {
            for (const { dx, dy, factor } of distribution) {
                const nx = x + dx;
                const ny = y + dy;
                
                if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                    const i = (ny * width + nx) * 4;
                    data[i] = Math.max(0, Math.min(255, data[i] + errR * factor));
                    data[i + 1] = Math.max(0, Math.min(255, data[i + 1] + errG * factor));
                    data[i + 2] = Math.max(0, Math.min(255, data[i + 2] + errB * factor));
                }
            }
        }

        function applyBayerDithering(imageData, matrix, isColor) {
            const { width, height, data } = imageData;
            const matrixSize = matrix.length;
            const maxValue = matrixSize * matrixSize;
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = (y * width + x) * 4;
                    const threshold = (matrix[y % matrixSize][x % matrixSize] / maxValue) * 255;
                    
                    if (isColor) {
                        data[i] = data[i] > threshold ? 255 : 0;
                        data[i + 1] = data[i + 1] > threshold ? 255 : 0;
                        data[i + 2] = data[i + 2] > threshold ? 255 : 0;
                    } else {
                        const gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
                        data[i] = data[i + 1] = data[i + 2] = gray > threshold ? 255 : 0;
                    }
                }
            }
        }

        function applyRandomDithering(imageData, threshold, isColor) {
            const { width, height, data } = imageData;
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = (y * width + x) * 4;
                    const randomThreshold = Math.random() * 255;
                    
                    if (isColor) {
                        data[i] = data[i] > randomThreshold ? 255 : 0;
                        data[i + 1] = data[i + 1] > randomThreshold ? 255 : 0;
                        data[i + 2] = data[i + 2] > randomThreshold ? 255 : 0;
                    } else {
                        const gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
                        data[i] = data[i + 1] = data[i + 2] = gray > randomThreshold ? 255 : 0;
                    }
                }
            }
        }

        function applyCrossStitch(imageData, cellSize, cellGap, isColor, threshold, thickness) {
            const { width, height, data } = imageData;
            const tempData = new Uint8ClampedArray(data);
            const step = cellSize + cellGap;
            
            data.fill(255);
            
            for (let y = 0; y < height; y += step) {
                for (let x = 0; x < width; x += step) {
                    let sumR = 0, sumG = 0, sumB = 0, count = 0;
                    
                    for (let cy = 0; cy < cellSize && y + cy < height; cy++) {
                        for (let cx = 0; cx < cellSize && x + cx < width; cx++) {
                            const i = ((y + cy) * width + (x + cx)) * 4;
                            sumR += tempData[i];
                            sumG += tempData[i + 1];
                            sumB += tempData[i + 2];
                            count++;
                        }
                    }
                    
                    const avgR = sumR / count;
                    const avgG = sumG / count;
                    const avgB = sumB / count;
                    const gray = 0.299 * avgR + 0.587 * avgG + 0.114 * avgB;
                    
                    if (gray < threshold) {
                        let colorR, colorG, colorB;
                        if (isColor) {
                            colorR = avgR;
                            colorG = avgG;
                            colorB = avgB;
                        } else {
                            colorR = colorG = colorB = 0;
                        }
                        
                        for (let d = 0; d < cellSize; d++) {
                            for (let t = 0; t < thickness; t++) {
                                const diag1X = x + d;
                                const diag1Y = y + d + t;
                                if (diag1X < width && diag1Y < height) {
                                    const idx1 = (diag1Y * width + diag1X) * 4;
                                    data[idx1] = colorR;
                                    data[idx1 + 1] = colorG;
                                    data[idx1 + 2] = colorB;
                                }
                                
                                const diag2X = x + d;
                                const diag2Y = y + cellSize - 1 - d - t;
                                if (diag2X < width && diag2Y >= y && diag2Y < height) {
                                    const idx2 = (diag2Y * width + diag2X) * 4;
                                    data[idx2] = colorR;
                                    data[idx2 + 1] = colorG;
                                    data[idx2 + 2] = colorB;
                                }
                            }
                        }
                    }
                }
            }
        }

        function applyPatternDithering(imageData, pattern, rotation, scale, isColor, cellSize, cellGap, threshold) {
            const { width, height, data } = imageData;
            const tempData = new Uint8ClampedArray(data);
            
            let rotatedPattern = pattern;
            if (rotation === 90) {
                rotatedPattern = pattern[0].map((_, i) => pattern.map(row => row[row.length - 1 - i]));
            } else if (rotation === 180) {
                rotatedPattern = pattern.slice().reverse().map(row => row.slice().reverse());
            } else if (rotation === 270) {
                rotatedPattern = pattern[0].map((_, i) => pattern.map(row => row[i]).reverse());
            }
            
            const patternH = rotatedPattern.length;
            const patternW = rotatedPattern[0].length;
            const scaledPatternH = Math.max(1, Math.floor(patternH * scale));
            const scaledPatternW = Math.max(1, Math.floor(patternW * scale));
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = (y * width + x) * 4;
                    const gray = 0.299 * tempData[i] + 0.587 * tempData[i + 1] + 0.114 * tempData[i + 2];
                    
                    const py = Math.floor((y / scaledPatternH) % patternH);
                    const px = Math.floor((x / scaledPatternW) % patternW);
                    const patternValue = rotatedPattern[py][px];
                    
                    if (isColor) {
                        data[i] = tempData[i] + patternValue > threshold ? 255 : 0;
                        data[i + 1] = tempData[i + 1] + patternValue > threshold ? 255 : 0;
                        data[i + 2] = tempData[i + 2] + patternValue > threshold ? 255 : 0;
                    } else {
                        data[i] = data[i + 1] = data[i + 2] = gray + patternValue > threshold ? 255 : 0;
                    }
                }
            }
        }

        // ============================================
        // EXPORT FUNCTION (SOLO PNG)
        // ============================================

        function exportPNG() {
            if (!originalImage) {
                alert('Nessuna immagine caricata');
                return;
            }
            
            const pixels = originalImage.width * originalImage.height;
            const maxPixels = isMobile() ? 4000000 : 25000000;
            
            if (pixels > maxPixels) {
                if (!confirm(`L'immagine originale è molto grande (${originalImage.width}×${originalImage.height}). L'export potrebbe richiedere tempo e memoria. Procedere comunque?`)) {
                    return;
                }
            }
            
            elements.loadingOverlay.classList.add('visible');
            elements.canvasContainer.classList.add('processing');
            
            setTimeout(() => {
                try {
                    const settings = getCurrentSettings();
                    const method = elements.ditheringMethod.value;
                    const exportCanvas = applyDitheringToImage(originalImage, method, settings);
                    
                    exportCanvas.toBlob((blob) => {
                        if (!blob) throw new Error('Impossibile creare PNG');
                        
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.download = `piexel-${Date.now()}.png`;
                        link.href = url;
                        link.click();
                        URL.revokeObjectURL(url);
                        
                        elements.loadingOverlay.classList.remove('visible');
                        elements.canvasContainer.classList.remove('processing');
                    }, 'image/png', 1.0);
                } catch (error) {
                    console.error('Export error:', error);
                    alert('Errore durante l\'export PNG');
                    elements.loadingOverlay.classList.remove('visible');
                    elements.canvasContainer.classList.remove('processing');
                }
            }, 100);
        }

        // ============================================
        // HISTORY MANAGEMENT
        // ============================================

        function addToHistory() {
            if (!canvas) return;
            
            if (historyIndex < history.length - 1) {
                const removed = history.splice(historyIndex + 1);
                removed.forEach(c => canvasPool.release(c));
            }
            
            const snapshot = canvasPool.get(canvas.width, canvas.height);
            const snapCtx = snapshot.getContext('2d');
            snapCtx.drawImage(canvas, 0, 0);
            history.push(snapshot);
            
            if (history.length > MAX_HISTORY) {
                const removed = history.shift();
                canvasPool.release(removed);
            } else {
                historyIndex++;
            }
            
            updateHistoryButtons();
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                restoreFromHistory();
            }
        }

        function redo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                restoreFromHistory();
            }
        }

        function restoreFromHistory() {
            if (historyIndex < 0 || historyIndex >= history.length) return;
            
            const snapshot = history[historyIndex];
            if (canvas) {
                canvas.width = snapshot.width;
                canvas.height = snapshot.height;
                ctx.drawImage(snapshot, 0, 0);
            }
            
            if (gridVisible) drawGrid();
            updateHistoryButtons();
        }

        function updateHistoryButtons() {
            elements.btnUndo.disabled = historyIndex <= 0;
            elements.btnRedo.disabled = historyIndex >= history.length - 1;
        }

        // ============================================
        // VIEWPORT CONTROLS
        // ============================================

        function resetViewport() {
            viewportState.scale = 1;
            viewportState.translateX = 0;
            viewportState.translateY = 0;
            updateCanvasTransform();
            updateZoomInfo();
        }

        function updateCanvasTransform() {
            if (!canvas) return;
            
            const transform = `translate(${viewportState.translateX}px, ${viewportState.translateY}px) scale(${viewportState.scale})`;
            elements.canvasWrapper.style.transform = transform;
            
            if (elements.gridCanvas) {
                elements.gridCanvas.style.transform = transform;
            }
        }

        function updateZoomInfo() {
            const percent = Math.round(viewportState.scale * 100);
            elements.zoomInfo.textContent = `${percent}%`;
        }

        function zoomIn() {
            viewportState.scale = Math.min(20, viewportState.scale * 1.2);
            updateCanvasTransform();
            updateZoomInfo();
            if (gridVisible) drawGrid();
        }

        function zoomOut() {
            viewportState.scale = Math.max(0.1, viewportState.scale / 1.2);
            updateCanvasTransform();
            updateZoomInfo();
            if (gridVisible) drawGrid();
        }

        function zoomReset() {
            resetViewport();
        }

        function zoomFit() {
            if (!canvas) return;
            
            const containerRect = elements.canvasViewport.getBoundingClientRect();
            const scaleX = containerRect.width / canvas.width;
            const scaleY = containerRect.height / canvas.height;
            viewportState.scale = Math.min(scaleX, scaleY) * 0.9;
            viewportState.translateX = 0;
            viewportState.translateY = 0;
            
            updateCanvasTransform();
            updateZoomInfo();
            if (gridVisible) drawGrid();
        }

        // ============================================
        // GRID
        // ============================================

        function drawGrid() {
            if (!canvas) return;
            
            const cellSize = parseInt(elements.sizeSlider.value);
            const scale = viewportState.scale;
            
            elements.gridCanvas.width = canvas.width;
            elements.gridCanvas.height = canvas.height;
            
            gridCtx.strokeStyle = '#ff6600';
            gridCtx.lineWidth = 1 / scale;
            
            for (let x = 0; x < canvas.width; x += cellSize) {
                gridCtx.beginPath();
                gridCtx.moveTo(x, 0);
                gridCtx.lineTo(x, canvas.height);
                gridCtx.stroke();
            }
            
            for (let y = 0; y < canvas.height; y += cellSize) {
                gridCtx.beginPath();
                gridCtx.moveTo(0, y);
                gridCtx.lineTo(canvas.width, y);
                gridCtx.stroke();
            }
            
            elements.gridCanvas.style.transform = elements.canvasWrapper.style.transform;
        }

        function toggleGrid() {
            gridVisible = !gridVisible;
            
            if (gridVisible) {
                elements.gridCanvas.classList.add('visible');
                elements.btnGrid.classList.add('active');
                drawGrid();
            } else {
                elements.gridCanvas.classList.remove('visible');
                elements.btnGrid.classList.remove('active');
            }
        }

        // ============================================
        // CROP FUNCTIONALITY
        // ============================================

        let cropSelection = null;

        function initCrop() {
            if (!canvas) return;
            
            cropState.active = true;
            elements.cropOverlay.classList.add('active');
            elements.canvasContainer.classList.add('crop-mode');
            elements.btnCrop.classList.add('active');
            
            const w = canvas.width * 0.5;
            const h = canvas.height * 0.5;
            const x = (canvas.width - w) / 2;
            const y = (canvas.height - h) / 2;
            
            cropState.x = x;
            cropState.y = y;
            cropState.width = w;
            cropState.height = h;
            
            drawCropSelection();
        }

        function drawCropSelection() {
            elements.cropOverlay.innerHTML = '';
            
            const selection = document.createElement('div');
            selection.className = 'crop-selection';
            selection.style.left = `${cropState.x}px`;
            selection.style.top = `${cropState.y}px`;
            selection.style.width = `${cropState.width}px`;
            selection.style.height = `${cropState.height}px`;
            
            ['nw', 'ne', 'sw', 'se'].forEach(pos => {
                const handle = document.createElement('div');
                handle.className = `crop-handle ${pos}`;
                handle.dataset.handle = pos;
                selection.appendChild(handle);
            });
            
            elements.cropOverlay.appendChild(selection);
            cropSelection = selection;
        }

        function cancelCrop() {
            cropState.active = false;
            elements.cropOverlay.classList.remove('active');
            elements.canvasContainer.classList.remove('crop-mode');
            elements.btnCrop.classList.remove('active');
            elements.cropOverlay.innerHTML = '';
            cropSelection = null;
        }

        function applyCrop() {
            if (!previewImage || !cropState.active) return;
            
            const croppedCanvas = document.createElement('canvas');
            croppedCanvas.width = Math.floor(cropState.width);
            croppedCanvas.height = Math.floor(cropState.height);
            const croppedCtx = croppedCanvas.getContext('2d');
            
            croppedCtx.drawImage(
                previewImage,
                cropState.x, cropState.y, cropState.width, cropState.height,
                0, 0, cropState.width, cropState.height
            );
            
            if (previewScale > 1) {
                const origCroppedCanvas = document.createElement('canvas');
                origCroppedCanvas.width = Math.floor(cropState.width * previewScale);
                origCroppedCanvas.height = Math.floor(cropState.height * previewScale);
                const origCroppedCtx = origCroppedCanvas.getContext('2d');
                
                origCroppedCtx.drawImage(
                    originalImage,
                    cropState.x * previewScale, cropState.y * previewScale,
                    cropState.width * previewScale, cropState.height * previewScale,
                    0, 0, cropState.width * previewScale, cropState.height * previewScale
                );
                
                const tempImg = new Image();
                tempImg.onload = function() {
                    originalImage = tempImg;
                    previewImage = croppedCanvas;
                    cancelCrop();
                    updateDimensionsDisplay();
                    processImage();
                };
                tempImg.src = origCroppedCanvas.toDataURL();
            } else {
                const tempImg = new Image();
                tempImg.onload = function() {
                    originalImage = tempImg;
                    previewImage = croppedCanvas;
                    cancelCrop();
                    updateDimensionsDisplay();
                    processImage();
                };
                tempImg.src = croppedCanvas.toDataURL();
            }
        }

        // ============================================
        // PATTERN LIBRARY UI
        // ============================================

        function initPatternLibrary() {
            elements.patternLibraryEl.innerHTML = '';
            
            for (const [name, pattern] of Object.entries(patternLibrary)) {
                const item = document.createElement('div');
                item.className = 'pattern-item';
                
                const previewCanvas = document.createElement('canvas');
                const size = 64;
                previewCanvas.width = size;
                previewCanvas.height = size;
                const previewCtx = previewCanvas.getContext('2d');
                
                const patternH = pattern.length;
                const patternW = pattern[0].length;
                const cellW = size / patternW;
                const cellH = size / patternH;
                
                for (let y = 0; y < patternH; y++) {
                    for (let x = 0; x < patternW; x++) {
                        const value = pattern[y][x];
                        previewCtx.fillStyle = value > 128 ? '#ffffff' : '#000000';
                        previewCtx.fillRect(x * cellW, y * cellH, cellW, cellH);
                    }
                }
                
                item.appendChild(previewCanvas);
                
                const nameEl = document.createElement('div');
                nameEl.className = 'pattern-name';
                nameEl.textContent = name.replace('-', ' ');
                item.appendChild(nameEl);
                
                item.addEventListener('click', () => {
                    document.querySelectorAll('.pattern-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    selectedPattern = pattern;
                    customPattern = null;
                    updatePatternPreview();
                    processImage();
                });
                
                elements.patternLibraryEl.appendChild(item);
            }
        }

        function updatePatternPreview() {
            if (!selectedPattern) return;
            
            elements.patternPreview.innerHTML = '';
            const previewCanvas = document.createElement('canvas');
            const size = 120;
            previewCanvas.width = size;
            previewCanvas.height = size;
            const previewCtx = previewCanvas.getContext('2d');
            
            let pattern = selectedPattern;
            if (patternRotation === 90) {
                pattern = pattern[0].map((_, i) => pattern.map(row => row[row.length - 1 - i]));
            } else if (patternRotation === 180) {
                pattern = pattern.slice().reverse().map(row => row.slice().reverse());
            } else if (patternRotation === 270) {
                pattern = pattern[0].map((_, i) => pattern.map(row => row[i]).reverse());
            }
            
            const patternH = pattern.length;
            const patternW = pattern[0].length;
            const scaledH = Math.max(1, Math.floor(patternH * patternScale));
            const scaledW = Math.max(1, Math.floor(patternW * patternScale));
            const cellW = size / scaledW;
            const cellH = size / scaledH;
            
            for (let y = 0; y < scaledH; y++) {
                for (let x = 0; x < scaledW; x++) {
                    const py = Math.floor((y / scaledH) * patternH);
                    const px = Math.floor((x / scaledW) * patternW);
                    const value = pattern[py][px];
                    previewCtx.fillStyle = value > 128 ? '#ffffff' : '#000000';
                    previewCtx.fillRect(x * cellW, y * cellH, cellW, cellH);
                }
            }
            
            elements.patternPreview.appendChild(previewCanvas);
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================

        const debouncedProcess = debounce(processImage, 300);

        elements.fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) loadImage(file);
        });

        elements.uploadArea.addEventListener('click', () => {
            elements.fileInput.click();
        });

        elements.placeholder.addEventListener('click', () => {
            elements.fileInput.click();
        });

        elements.uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            elements.uploadArea.style.background = '#000000';
            elements.uploadArea.style.color = '#ffffff';
        });

        elements.uploadArea.addEventListener('dragleave', () => {
            elements.uploadArea.style.background = '#ffffff';
            elements.uploadArea.style.color = '#000000';
        });

        elements.uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            elements.uploadArea.style.background = '#ffffff';
            elements.uploadArea.style.color = '#000000';
            const file = e.dataTransfer.files[0];
            if (file) loadImage(file);
        });

        elements.btnBW.addEventListener('click', () => {
            isColorMode = false;
            elements.btnBW.classList.add('active');
            elements.btnColor.classList.remove('active');
            elements.transparentOption.style.display = 'block';
            processImage();
        });

        elements.btnColor.addEventListener('click', () => {
            isColorMode = true;
            elements.btnColor.classList.add('active');
            elements.btnBW.classList.remove('active');
            elements.transparentOption.style.display = 'none';
            processImage();
        });

        elements.sizeSlider.addEventListener('input', (e) => {
            elements.sizeValue.textContent = e.target.value;
            debouncedProcess();
        });

        elements.cellGapSlider.addEventListener('input', (e) => {
            elements.cellGapValue.textContent = e.target.value;
            debouncedProcess();
        });

        elements.thresholdSlider.addEventListener('input', (e) => {
            elements.thresholdValue.textContent = e.target.value;
            debouncedProcess();
        });

        elements.thicknessSlider.addEventListener('input', (e) => {
            elements.thicknessValue.textContent = e.target.value;
            debouncedProcess();
        });

        elements.ditheringMethod.addEventListener('change', (e) => {
            const method = e.target.value;
            elements.cellGroup.style.display = ['bitmap', 'stretch', 'crossstitch', 'pattern'].includes(method) ? 'block' : 'none';
            elements.thresholdGroup.style.display = ['bitmap', 'random', 'pattern', 'crossstitch'].includes(method) ? 'block' : 'none';
            elements.thicknessGroup.style.display = ['stretch', 'crossstitch'].includes(method) ? 'block' : 'none';
            elements.patternControls.style.display = method === 'pattern' ? 'block' : 'none';
            processImage();
        });

        elements.patternInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const maxSize = 32;
                const scale = Math.min(maxSize / img.width, maxSize / img.height);
                canvas.width = Math.max(1, Math.floor(img.width * scale));
                canvas.height = Math.max(1, Math.floor(img.height * scale));
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const pattern = [];
                for (let y = 0; y < canvas.height; y++) {
                    const row = [];
                    for (let x = 0; x < canvas.width; x++) {
                        const i = (y * canvas.width + x) * 4;
                        const gray = 0.299 * imageData.data[i] + 0.587 * imageData.data[i + 1] + 0.114 * imageData.data[i + 2];
                        row.push(gray);
                    }
                    pattern.push(row);
                }
                
                customPattern = pattern;
                selectedPattern = pattern;
                document.querySelectorAll('.pattern-item').forEach(el => el.classList.remove('active'));
                updatePatternPreview();
                processImage();
                URL.revokeObjectURL(img.src);
            };
            img.src = URL.createObjectURL(file);
        });

        document.querySelectorAll('.rotation-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.rotation-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                patternRotation = parseInt(e.target.dataset.rotation);
                updatePatternPreview();
                processImage();
            });
        });

        elements.patternScaleSlider.addEventListener('input', (e) => {
            patternScale = parseFloat(e.target.value);
            elements.patternScaleValue.textContent = patternScale.toFixed(2);
            updatePatternPreview();
            debouncedProcess();
        });

        elements.transparentBg.addEventListener('change', processImage);
        elements.exportPNG.addEventListener('click', exportPNG);
        elements.btnUndo.addEventListener('click', undo);
        elements.btnRedo.addEventListener('click', redo);
        elements.btnZoomIn.addEventListener('click', zoomIn);
        elements.btnZoomOut.addEventListener('click', zoomOut);
        elements.btnZoomReset.addEventListener('click', zoomReset);
        elements.btnZoomFit.addEventListener('click', zoomFit);
        elements.btnGrid.addEventListener('click', toggleGrid);
        
        elements.btnCrop.addEventListener('click', () => {
            if (cropState.active) {
                if (confirm('Applicare il crop?')) {
                    applyCrop();
                } else {
                    cancelCrop();
                }
            } else {
                initCrop();
            }
        });

        elements.menuToggle.addEventListener('click', () => {
            elements.controlsPanel.classList.toggle('open');
        });

        // Panning con mouse/touch
        elements.canvasContainer.addEventListener('mousedown', (e) => {
            if (cropState.active || e.button !== 0) return;
            viewportState.isDragging = true;
            viewportState.startX = e.clientX - viewportState.translateX;
            viewportState.startY = e.clientY - viewportState.translateY;
            elements.canvasContainer.classList.add('grabbing');
        });

        document.addEventListener('mousemove', (e) => {
            if (!viewportState.isDragging) return;
            viewportState.translateX = e.clientX - viewportState.startX;
            viewportState.translateY = e.clientY - viewportState.startY;
            updateCanvasTransform();
        });

        document.addEventListener('mouseup', () => {
            if (viewportState.isDragging) {
                viewportState.isDragging = false;
                elements.canvasContainer.classList.remove('grabbing');
            }
        });

        // Zoom con rotella
        elements.canvasContainer.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY < 0 ? 1.1 : 0.9;
            viewportState.scale = Math.max(0.1, Math.min(20, viewportState.scale * delta));
            updateCanvasTransform();
            updateZoomInfo();
            if (gridVisible) drawGrid();
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
            
            if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
                e.preventDefault();
                undo();
            } else if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'z') {
                e.preventDefault();
                redo();
            } else if (e.key === 'z' || e.key === 'Z') {
                zoomIn();
            } else if (e.key === 'x' || e.key === 'X') {
                zoomOut();
            } else if (e.key === '0') {
                zoomReset();
            } else if (e.key === 'f' || e.key === 'F') {
                zoomFit();
            } else if (e.key === 'g' || e.key === 'G') {
                toggleGrid();
            } else if (e.key === 'c' || e.key === 'C') {
                if (!cropState.active) {
                    initCrop();
                }
            }
        });

        // ============================================
        // INITIALIZATION
        // ============================================

        function init() {
            initPatternLibrary();
            updateHistoryButtons();
            elements.transparentOption.style.display = 'block';
            
            const initialMethod = elements.ditheringMethod.value;
            elements.thresholdGroup.style.display = ['bitmap', 'random'].includes(initialMethod) ? 'block' : 'none';
            elements.thicknessGroup.style.display = initialMethod === 'stretch' ? 'block' : 'none';
        }

        init();
    </script>
</body>
</html>
